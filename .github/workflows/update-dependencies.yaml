name: Monthly Dependency Update (Go)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 28 * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Update Dependencies and Generate Report
        id: update
        run: |
          # 1. Run the update
          go get -u ./...
          go mod tidy

          # 2. Capture the diff into a variable first
          # This ensures we handle the output as a single string
          DIFF=$(git diff go.mod || echo "No changes to go.mod")

          # 3. Write it to the environment file using the heredoc (EOF)
          echo "UPDATE_REPORT<<EOF" >> $GITHUB_ENV
          echo "$DIFF" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run Unit tests
        id: test
        run: go test ./...

      - name: Create Pull Request on Success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Check for changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected. Skipping PR."
            exit 0
          fi

          # 3. Commit and Push
          git checkout -b auto-update-deps
          git add go.mod go.sum
          git commit -m "chore: monthly go dependency update"
          git push origin auto-update-deps --force

          # Define the PR Body
          PR_BODY="## 🤖 Monthly Go Dependency Update
          
          **Status:** ✅ Unit Tests Passed
          **Date:** $(date +'%Y-%m-%d')
          
          <details>
          <summary><b>📦 View Modified go.mod</b> (Click to expand)</summary>
          
          \`\`\`diff
          ${{ env.UPDATE_REPORT }}
          \`\`\`
          
          </details>
          
          ---
          *This PR was automatically generated by the Go maintenance workflow.*"

          # Create PR
          gh pr create \
            --title "📦 Update Go Dependencies ($(date +'%b %Y'))" \
            --body "$PR_BODY" \
            --head auto-update-deps \
            --label "dependencies" || echo "PR already exists, updated via force-push."

      - name: Create Issue on Failure
        if: failure() && steps.test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Failed: Monthly Go dependency update" \
            --body "The monthly Go dependency update failed unit tests. Diff: 
            \`\`\`diff
            ${{ env.UPDATE_REPORT }}
            \`\`\`" \
            --label "github-actions"
