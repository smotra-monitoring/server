server:
    host: 0.0.0.0
    port: 8080
    read_timeout: 15s
    write_timeout: 15s
    idle_timeout: 2m0s
    shutdown_timeout: 30s
    environment: development
database_type: sqlite
sqlite_config:
    config:
        type: sqlite
        maxopenconns: 25
        maxidleconns: 5
        connmaxlifetime: 15m0s
        connmaxidletime: 5m0s
    filepath: ./data/smotra.db
logging:
    level: debug
    format: text
auth:
    jwt_secret: development-secret-change-in-production
    jwt_expiration: 24h0m0s
agent:
    claim_token_expiration_hours: 24
    server_url: https://smotra.net
    claim_poll_initial_interval_secs: 5
    claim_poll_increment_secs: 5
    claim_poll_max_interval_secs: 30
